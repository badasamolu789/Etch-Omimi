<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Etch by OMIMI</title>
    <meta name="description" content="Reset your password for the ETCH marketplace." />
    <meta name="keywords" content="Etch password reset, forgot password" />
    <meta name="theme-color" content="#99A96A" />
    <link rel="icon" href="../assets/logo/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="../assets/logo/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
</head>

<body class="bg-mist text-ink font-body auth-screen">
    <main class="auth-screen__main">
        <div class="auth-card auth-card--highlight auth-card--centered">
            <div class="auth-card__brand">
                <a href="../index" class="brand-mark auth-brand">
                    <img class="brand-mark__logo" src="../img/logo/logo.png" alt="Etch by OMIMI logo" />
                    <span><strong>Etch</strong><small>by OMIMI</small></span>
                </a>
            </div>
            <span class="eyebrow">Reset password</span>
            <h1 class="section-title">Reset password</h1>
            <form class="auth-form" data-forgot-form>
                <label>
                    Email address
                    <input type="email" name="email" placeholder="you@example.com" required />
                </label>
                <button class="button button--primary" type="submit">Send Reset Link</button>
                <p class="form-feedback" data-forgot-feedback></p>
            </form>
            <p class="mt-6 text-slate">Remembered your password? <a href="signin" class="text-gold">Sign in</a></p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/config.js"></script>
  <script src="../scripts/supabase.js"></script>
    <script src="../scripts/auth.js"></script>
</body>

</html>
