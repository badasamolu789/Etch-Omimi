<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Etch by OMIMI</title>
    <meta name="description" content="Create your Etch by OMIMI account and join a premium creative marketplace." />
    <meta name="keywords" content="Etch sign up, creative marketplace account" />
    <meta name="theme-color" content="#99A96A" />
    <link rel="icon" href="../assets/logo/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="../assets/logo/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
</head>

<body class="bg-mist text-ink font-body auth-screen">
    <main class="auth-screen__main">
        <div class="auth-card auth-card--highlight auth-card--centered">
            <div class="auth-card__brand">
                <a href="../index" class="brand-mark auth-brand">
                    <img class="brand-mark__logo" src="../img/logo/logo.png" alt="Etch by OMIMI logo" />
                    <span><strong>Etch</strong><small>by OMIMI</small></span>
                </a>
            </div>
            <span class="eyebrow">Sign up</span>
            <h1 class="section-title">Create account</h1>
            <form class="auth-form" data-signup-form>
                <label>
                    Full name
                    <input type="text" name="full_name" placeholder="Your full name" required />
                </label>
                <label>
                    Email address
                    <input type="email" name="email" placeholder="you@example.com" required />
                </label>
                <label>
                    Password
                    <input type="password" name="password" placeholder="Create password" required />
                </label>
                <label>
                    Confirm password
                    <input type="password" name="confirm_password" placeholder="Confirm password" required />
                </label>
                <label>
                    Account type
                    <select name="role" required>
                        <option value="">Select account type</option>
                        <option value="buyer">Buyer / Client</option>
                        <option value="creator">Creator</option>
                    </select>
                </label>
                <label class="inline-form">
                    <input type="checkbox" name="terms" required /> I agree to the ETCH terms and privacy policy.
                </label>
                <button class="button button--primary" type="submit" data-signup-button>Create Account</button>
                <p class="form-feedback" data-signup-feedback></p>
            </form>
            <p class="mt-6 text-slate">Already registered? <a href="signin" class="text-gold">Sign in</a></p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/config.js"></script>
  <script src="../scripts/supabase.js"></script>
    <script src="../scripts/auth.js"></script>
</body>

</html>
