<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator Dashboard | Etch by OMIMI</title>
    <meta name="description"
        content="A premium creator dashboard for tracking listings, licensing, and storefront performance." />
    <meta name="theme-color" content="#99A96A" />
    <link rel="icon" href="../assets/logo/logo.png" type="image/png" />
    <link rel="stylesheet" href="../styles.css" />
</head>

<body class="dashboard-body">
    <div class="dashboard-layout">
        <div data-component="include" data-src="../components/user-sidebar.html"></div>
        <main class="dashboard-main">
            <div data-component="include" data-src="../components/user-topbar.html"></div>
            <section class="dashboard-grid" data-dashboard-stats>
                <article class="dashboard-card dashboard-card--feature">
                    <p class="dashboard-label">Loading dashboard</p>
                    <h2>Fetching live creator performance metrics.</h2>
                    <p>Live values will replace this placeholder once your dashboard data loads.</p>
                </article>
            </section>

            <section class="dashboard-columns">
                <article class="dashboard-card" data-dashboard-primary-list></article>
                <article class="dashboard-card" data-dashboard-secondary-list></article>
            </section>
        </main>
    </div>
    <script src="../scripts/components.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/dashboard.js"></script>
    <script src="../scripts/main.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/supabase.js"></script>
    <script src="../scripts/auth.js"></script>
</body>

</html>
